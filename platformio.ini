[platformio]
default_envs =
    waveshare_single_can_standalone
    native

[espidf6]
platform = platformio/espressif32@7.0.0
platform_packages =
    framework-espidf @ 4.60001.0

[env:waveshare_single_can_standalone]
; Waveshare ESP32-S3-RS485-CAN standalone product profile.
; Single CAN: native TWAI only, no MCP2515/CAN2 runtime.
platform = ${espidf6.platform}
platform_packages = ${espidf6.platform_packages}
board = esp32s3box
framework = espidf
extra_scripts =
    pre:scripts/update_ota_build_timestamp.py
    pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
board_build.flash_size = 16MB
build_flags =
    -I include
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_SINGLE_CAN_STANDALONE=1
    -DDASH_INITIAL_HW_MODE=3
    -DTWAI_TX_PIN=GPIO_NUM_15
    -DTWAI_RX_PIN=GPIO_NUM_16
    -DTWAI_RX_QUEUE_LEN=64
    -DTWAI_TX_QUEUE_LEN=16
    -DDASH_FSD_252_COMPAT=1
    -DPIN_LED=14
    -DDASH_STA_AP_GATEWAY
    -DESP_IDF_LWIP_HOOK_FILENAME=\"lwip_hooks.h\"
    -DDASH_PLUGIN_ENGINE=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_16mb_ota_4096k_nvs64.csv
monitor_speed = 115200

[env:native]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
test_ignore =
    test_native_dashboard
    test_native_injection_after_ap
    test_native_mcp2515_recovery
    test_native_nag
    test_native_hw3
    test_native_hw4
    test_native_legacy
    test_native_helpers
    test_native_twai
    test_native_plugin_engine
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_*

[env:native_dashboard]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT -DNAG_KILLER
test_filter = test_native_dashboard

[env:native_single_can_dashboard]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD -DDASH_SINGLE_CAN_STANDALONE=1 -DDASH_INITIAL_HW_MODE=3 -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT -DNAG_KILLER
build_src_filter = +<*> -<main.cpp>
test_filter = test_native_dashboard

[env:native_log_buffer]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_log_buffer

[env:native_mcp2515_recovery]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DPIN_CAN_INTERRUPT=2 -Itest/test_native_mcp2515_recovery
test_filter = test_native_mcp2515_recovery

[env:native_nag]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DNAG_KILLER
test_filter = test_native_nag

[env:native_injection_after_ap]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DENHANCED_AUTOPILOT -DINJECTION_AFTER_AP
test_filter = test_native_injection_after_ap

[env:native_hw3]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_hw3

[env:native_hw4]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_hw4

[env:native_legacy]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_legacy

[env:native_helpers]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_helpers

[env:native_twai]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_twai

[env:native_plugin_engine]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags = -std=c++17 -DNATIVE_BUILD -DDASH_PLUGIN_ENGINE=1 -DDASH_SINGLE_CAN_STANDALONE=1 -DENHANCED_AUTOPILOT
build_src_filter = +<*> -<main.cpp>
test_filter = test_native_plugin_engine

[env:native_reactive_nag]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_reactive_nag

[env:native_epas_late_echo]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_epas_late_echo

[env:native_wheel_dnd]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_wheel_dnd
