name: Auto Tag Stable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create stable version tag
        id: tag
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "VERSION ${VERSION} is not a stable release version; skipping tag."
            echo "created=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Suffixed tag to match the release convention (v<VERSION>-atlas-single-can),
          # so the auto-created tag triggers release.yml and produces a suffixed release
          # consistent with prior versions (v1.0.1/v1.0.2-atlas-single-can).
          TAG="v${VERSION}-atlas-single-can"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping release dispatch."
            echo "created=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          echo "created=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Start release workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${{ steps.tag.outputs.tag }}"
